name: Build exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Build exe
        run: uv run pyinstaller NCHU_Diary_AutoFill.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NCHU_Diary_AutoFill
          path: dist/NCHU_Diary_AutoFill.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NCHU_Diary_AutoFill.exe
